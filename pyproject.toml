[project]
name = "prompt-vault"
version = "0.1.0"
description = "A CLI tool to manage a personal prompt library in a private git repo"
requires-python = ">=3.8"
dependencies = [
    "click>=8.0.0",
    "requests>=2.28.0",
]

[project.scripts]
pv = "prompt_vault.cli:main"

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
